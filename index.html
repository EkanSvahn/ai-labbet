<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI-Labbet 🤖✨</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F1F1E6;
  --ink: #131416;
  --violet: #663FFF;
  --peach: #F4978E;
  --sun: #FFD23F;
  --mint: #6BCB77;
  --sky: #4D96FF;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { overflow-x: hidden; }
body {
  font-family: 'Nunito', system-ui, sans-serif;
  font-weight: 700;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  padding: 24px 16px;
  background-image:
    radial-gradient(circle at 10% 20%, rgba(102, 63, 255, 0.10) 0%, transparent 30%),
    radial-gradient(circle at 90% 80%, rgba(244, 151, 142, 0.12) 0%, transparent 30%),
    radial-gradient(circle at 50% 50%, rgba(255, 210, 63, 0.06) 0%, transparent 40%);
}
.container { max-width: 1100px; margin: 0 auto; }

header { text-align: center; margin-bottom: 40px; position: relative; }
.brand {
  font-family: 'Fredoka', sans-serif;
  font-weight: 700;
  font-size: clamp(2.5rem, 7vw, 5rem);
  letter-spacing: -0.02em;
  line-height: 0.95;
  text-transform: uppercase;
}
.brand .accent { color: var(--violet); }
.brand .sparkle { display: inline-block; transform: translateY(-0.15em); animation: spin 4s linear infinite; }
@keyframes spin { from { transform: translateY(-0.15em) rotate(0deg); } to { transform: translateY(-0.15em) rotate(360deg); } }
.tagline {
  font-size: clamp(1rem, 2vw, 1.4rem);
  margin-top: 12px;
  opacity: 0.7;
}
.mascot {
  width: 140px;
  margin: 0 auto 16px;
  display: block;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { transform: translateY(0) rotate(-2deg); }
  50% { transform: translateY(-10px) rotate(2deg); }
}

#mode-selector {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
  margin-bottom: 40px;
}
.mode-card {
  background: white;
  border: 4px solid var(--ink);
  border-radius: 28px;
  padding: 32px 24px;
  cursor: pointer;
  text-align: left;
  font-family: 'Fredoka', sans-serif;
  font-weight: 600;
  box-shadow: 0 6px 0 var(--ink);
  transition: transform 0.15s, box-shadow 0.15s, background 0.2s;
  position: relative;
  overflow: hidden;
  color: var(--ink);
}
.mode-card:hover { transform: translate(-2px, -4px); box-shadow: 0 10px 0 var(--ink); }
.mode-card:active { transform: translate(0, 2px); box-shadow: 0 4px 0 var(--ink); }
.mode-card .emoji { font-size: 3.5rem; display: block; margin-bottom: 12px; }
.mode-card h3 {
  font-size: 1.8rem; font-weight: 700; margin-bottom: 8px;
  text-transform: uppercase; letter-spacing: -0.01em;
}
.mode-card p {
  font-size: 1.05rem; font-family: 'Nunito', sans-serif;
  font-weight: 700; opacity: 0.75; line-height: 1.4;
}
.mode-card[data-mode="detective"] { background: #FFF6E0; }
.mode-card[data-mode="detective"]:hover { background: var(--sun); }
.mode-card[data-mode="story"] { background: #FFE9E6; }
.mode-card[data-mode="story"]:hover { background: var(--peach); }
.mode-card[data-mode="ask"] { background: #E6E0FF; }
.mode-card[data-mode="ask"]:hover { background: var(--violet); color: white; }
.mode-card[data-mode="ask"]:hover p { opacity: 0.9; color: white; }

.mode-view {
  background: white;
  border: 4px solid var(--ink);
  border-radius: 28px;
  padding: clamp(20px, 3vw, 36px);
  box-shadow: 0 6px 0 var(--ink);
}
.back-btn {
  background: var(--ink); color: white; border: none; border-radius: 100px;
  padding: 10px 20px; font-family: 'Fredoka', sans-serif;
  font-size: 1rem; font-weight: 600; cursor: pointer;
  margin-bottom: 24px; display: inline-flex; align-items: center; gap: 8px;
  transition: background 0.2s;
}
.back-btn:hover { background: var(--violet); }
.mode-title {
  font-family: 'Fredoka', sans-serif;
  font-size: clamp(1.8rem, 4vw, 2.6rem);
  font-weight: 700; margin-bottom: 16px; text-transform: uppercase;
}
.hint {
  font-size: 1.05rem; opacity: 0.75; margin-bottom: 24px;
  font-family: 'Nunito', sans-serif; font-weight: 700; line-height: 1.5;
}

.image-area {
  display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px;
}
@media (max-width: 600px) { .image-area { grid-template-columns: 1fr; } }
.upload-btn, .camera-btn {
  background: var(--bg); border: 3px dashed var(--ink); border-radius: 20px;
  padding: 40px 20px; text-align: center; cursor: pointer;
  font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 1.2rem;
  transition: all 0.2s; display: block;
}
.upload-btn:hover, .camera-btn:hover {
  background: var(--sun); border-style: solid; transform: translateY(-2px);
}
.upload-btn .icon, .camera-btn .icon { font-size: 3rem; display: block; margin-bottom: 12px; }

#image-preview {
  max-width: 100%; max-height: 400px; border-radius: 20px;
  border: 4px solid var(--ink); margin-bottom: 20px; display: block;
}
.action-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 8px; }

.btn-primary {
  background: var(--violet); color: white; border: 3px solid var(--ink);
  border-radius: 100px; padding: 16px 28px; font-family: 'Fredoka', sans-serif;
  font-weight: 700; font-size: 1.15rem; cursor: pointer;
  box-shadow: 4px 4px 0 var(--ink); transition: all 0.15s;
}
.btn-primary:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--ink); }
.btn-primary:active { transform: translate(2px, 2px); box-shadow: 0 0 0 var(--ink); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-secondary {
  background: white; color: var(--ink); border: 3px solid var(--ink);
  border-radius: 100px; padding: 16px 24px; font-family: 'Fredoka', sans-serif;
  font-weight: 600; font-size: 1.05rem; cursor: pointer;
}
.btn-secondary:hover { background: var(--bg); }

.word-inputs {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px;
}
@media (max-width: 600px) { .word-inputs { grid-template-columns: 1fr; } }
.word-input {
  background: var(--bg); border: 3px solid var(--ink); border-radius: 20px;
  padding: 20px; font-family: 'Fredoka', sans-serif; font-weight: 600;
  font-size: 1.4rem; text-align: center; width: 100%;
}
.word-input:focus { outline: none; background: var(--sun); }
.word-label {
  display: block; font-size: 0.9rem; margin-bottom: 8px;
  text-transform: uppercase; opacity: 0.6; text-align: center;
  font-family: 'Fredoka', sans-serif;
}

.ask-input {
  width: 100%; background: var(--bg); border: 3px solid var(--ink);
  border-radius: 20px; padding: 20px; font-family: 'Fredoka', sans-serif;
  font-weight: 500; font-size: 1.3rem; min-height: 120px;
  resize: vertical; margin-bottom: 20px;
}
.ask-input:focus { outline: none; background: #FFFEF5; }

.result {
  background: linear-gradient(135deg, var(--mint) 0%, #4CAF50 100%);
  color: white; border: 4px solid var(--ink); border-radius: 20px;
  padding: 32px 28px 28px; margin-top: 32px; font-size: 1.3rem;
  line-height: 1.6; position: relative; box-shadow: 6px 6px 0 var(--ink);
  font-family: 'Nunito', sans-serif; font-weight: 700;
  animation: pop 0.4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes pop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.result.violet { background: linear-gradient(135deg, var(--violet) 0%, #4F1FCC 100%); }
.result.peach { background: linear-gradient(135deg, var(--peach) 0%, #E76F66 100%); color: var(--ink); }
.result::before {
  content: '🤖'; position: absolute; top: -28px; left: 24px;
  font-size: 2rem; background: white; border: 4px solid var(--ink);
  border-radius: 100%; width: 56px; height: 56px;
  display: flex; align-items: center; justify-content: center;
}

.loading {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  padding: 32px; font-family: 'Fredoka', sans-serif;
  font-size: 1.3rem; font-weight: 600;
}
.loading .dot {
  width: 16px; height: 16px; background: var(--violet);
  border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both;
}
.loading .dot:nth-child(1) { animation-delay: -0.32s; }
.loading .dot:nth-child(2) { animation-delay: -0.16s; }
@keyframes bounce {
  0%, 80%, 100% { transform: scale(0); }
  40% { transform: scale(1); }
}

.error {
  background: #ffe0e0; border: 3px solid #c33; border-radius: 16px;
  padding: 16px; color: #800; margin-top: 16px;
  font-family: 'Nunito', sans-serif; font-weight: 700;
}
.hidden { display: none !important; }
#camera-video {
  width: 100%; max-width: 500px; border-radius: 20px;
  border: 4px solid var(--ink); margin-bottom: 16px; display: block;
}
#camera-canvas { display: none; }
</style>
</head>
<body>
<div class="container">
  <header>
    <svg class="mascot" viewBox="0 0 120 130" xmlns="http://www.w3.org/2000/svg">
      <line x1="60" y1="22" x2="60" y2="8" stroke="#131416" stroke-width="4" stroke-linecap="round"/>
      <circle cx="60" cy="8" r="6" fill="#663FFF" stroke="#131416" stroke-width="3"/>
      <rect x="22" y="22" width="76" height="60" rx="14" fill="#FFD23F" stroke="#131416" stroke-width="4"/>
      <circle cx="45" cy="48" r="8" fill="white" stroke="#131416" stroke-width="3"/>
      <circle cx="75" cy="48" r="8" fill="white" stroke="#131416" stroke-width="3"/>
      <circle cx="45" cy="48" r="3.5" fill="#131416"/>
      <circle cx="75" cy="48" r="3.5" fill="#131416"/>
      <path d="M 42 64 Q 60 76 78 64" stroke="#131416" stroke-width="4" fill="none" stroke-linecap="round"/>
      <rect x="32" y="82" width="56" height="34" rx="10" fill="#663FFF" stroke="#131416" stroke-width="4"/>
      <rect x="14" y="88" width="14" height="22" rx="6" fill="#F4978E" stroke="#131416" stroke-width="3"/>
      <rect x="92" y="88" width="14" height="22" rx="6" fill="#F4978E" stroke="#131416" stroke-width="3"/>
      <circle cx="48" cy="99" r="3" fill="#FFD23F"/>
      <circle cx="60" cy="99" r="3" fill="#FFD23F"/>
      <circle cx="72" cy="99" r="3" fill="#FFD23F"/>
    </svg>
    <h1 class="brand">AI-<span class="accent">Labbet</span> <span class="sparkle">✨</span></h1>
    <p class="tagline">Tre häftiga grejer vi kan göra med AI</p>
  </header>

  <main id="mode-selector">
    <button class="mode-card" data-mode="detective">
      <span class="emoji">🔍</span>
      <h3>Bilddetektiv</h3>
      <p>Ta en bild — så ser AI:n vad som finns på den och berättar!</p>
    </button>
    <button class="mode-card" data-mode="story">
      <span class="emoji">📖</span>
      <h3>Berättarbygget</h3>
      <p>Säg tre ord — AI:n hittar på en helt knäpp berättelse!</p>
    </button>
    <button class="mode-card" data-mode="ask">
      <span class="emoji">🤖</span>
      <h3>Fråga roboten</h3>
      <p>Vad ni än undrar — fråga AI:n så svarar den!</p>
    </button>
  </main>

  <section id="mode-content" class="hidden mode-view"></section>
</div>

<script>
let currentMode = null;
let uploadedImageData = null;
let cameraStream = null;

const modeSelector = document.getElementById('mode-selector');
const modeContent = document.getElementById('mode-content');

// Anropet går till vår egen serverless proxy istället för direkt till Anthropic.
// Proxyn (/api/claude.js) lägger på API-nyckeln och forwardar.
async function callClaude(messages, maxTokens = 1000) {
  const response = await fetch("/api/claude", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: maxTokens,
      messages: messages
    })
  });
  if (!response.ok) {
    const errText = await response.text();
    throw new Error("API-fel: " + errText);
  }
  const data = await response.json();
  return data.content
    .filter(c => c.type === "text")
    .map(c => c.text)
    .join("\n");
}

document.querySelectorAll('.mode-card').forEach(card => {
  card.addEventListener('click', () => showMode(card.dataset.mode));
});

function showMode(mode) {
  currentMode = mode;
  modeSelector.classList.add('hidden');
  modeContent.classList.remove('hidden');
  if (mode === 'detective') renderDetective();
  else if (mode === 'story') renderStory();
  else if (mode === 'ask') renderAsk();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function backToMenu() {
  stopCamera();
  uploadedImageData = null;
  currentMode = null;
  modeContent.classList.add('hidden');
  modeSelector.classList.remove('hidden');
  modeContent.innerHTML = '';
}

function backButton() {
  return `<button class="back-btn" onclick="backToMenu()">← Tillbaka</button>`;
}

function loadingHTML(msg = 'AI:n tänker...') {
  return `<div class="loading">
    <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    <span>${msg}</span>
  </div>`;
}

function renderDetective() {
  modeContent.innerHTML = `
    ${backButton()}
    <h2 class="mode-title">🔍 Bilddetektiv</h2>
    <p class="hint">Välj en bild från datorn — eller ta en bild med kameran. Sen tittar AI:n på den och berättar vad den ser!</p>
    <div class="image-area" id="image-area">
      <label class="upload-btn">
        <span class="icon">📁</span>
        Välj bild
        <input type="file" accept="image/*" style="display:none" onchange="handleFileUpload(event)">
      </label>
      <button class="camera-btn" onclick="startCamera()">
        <span class="icon">📷</span>
        Använd kameran
      </button>
    </div>
    <div id="image-display"></div>
    <div id="detective-result"></div>
  `;
}

function handleFileUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    uploadedImageData = e.target.result;
    showImageAndAnalyze();
  };
  reader.readAsDataURL(file);
}

async function startCamera() {
  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    const display = document.getElementById('image-display');
    display.innerHTML = `
      <video id="camera-video" autoplay playsinline></video>
      <div class="action-row">
        <button class="btn-primary" onclick="capturePhoto()">📸 Ta bilden!</button>
        <button class="btn-secondary" onclick="stopCamera(); document.getElementById('image-display').innerHTML='';">Avbryt</button>
      </div>
      <canvas id="camera-canvas"></canvas>
    `;
    const video = document.getElementById('camera-video');
    video.srcObject = cameraStream;
  } catch (err) {
    document.getElementById('image-display').innerHTML = `
      <div class="error">Hoppsan! Vi kommer inte åt kameran. Prova att välja en bild istället. (${err.message})</div>
    `;
  }
}

function capturePhoto() {
  const video = document.getElementById('camera-video');
  const canvas = document.getElementById('camera-canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  uploadedImageData = canvas.toDataURL('image/jpeg', 0.85);
  stopCamera();
  showImageAndAnalyze();
}

function stopCamera() {
  if (cameraStream) {
    cameraStream.getTracks().forEach(t => t.stop());
    cameraStream = null;
  }
}

function showImageAndAnalyze() {
  const display = document.getElementById('image-display');
  display.innerHTML = `
    <img id="image-preview" src="${uploadedImageData}" alt="Vald bild">
    <div class="action-row">
      <button class="btn-primary" onclick="analyzeImage()">🤖 Vad ser AI:n?</button>
      <button class="btn-primary" style="background:var(--peach);color:var(--ink)" onclick="transformImage()">✨ Förvandla i fantasin!</button>
      <button class="btn-secondary" onclick="renderDetective()">Byt bild</button>
    </div>
  `;
}

async function analyzeImage() {
  await runImageAnalysis(
    "Du pratar med ett barn i årskurs 1 (cirka 7-8 år) som visar dig en bild. Beskriv på enkel svenska vad du ser i bilden, på ett varmt och nyfiket sätt. Använd korta meningar och gärna något utrop eller ljudord. Var rolig och engagerad. Skriv 3-5 meningar. Avsluta gärna med en rolig observation eller fråga.",
    'mint'
  );
}

async function transformImage() {
  await runImageAnalysis(
    "Du pratar med ett barn i årskurs 1 (7-8 år) som visar dig en bild. Hitta på en VILD och fantasifull beskrivning av hur den här bilden skulle se ut om den var magisk — kanske i rymden, i ett sagoland, i framtiden, eller helt förvandlad. Använd enkel svenska och korta meningar. Måla en rolig och tokig bild i ord så att barnet kan se det framför sig. 4-6 meningar. Inget läskigt, inget våld.",
    'violet'
  );
}

async function runImageAnalysis(promptText, color) {
  const resultEl = document.getElementById('detective-result');
  resultEl.innerHTML = loadingHTML('AI:n tittar på bilden...');
  try {
    const base64Match = uploadedImageData.match(/^data:(image\/[a-z]+);base64,(.+)$/);
    if (!base64Match) throw new Error("Bilden är i ett konstigt format");
    const mediaType = base64Match[1];
    const base64 = base64Match[2];
    const text = await callClaude([{
      role: "user",
      content: [
        { type: "image", source: { type: "base64", media_type: mediaType, data: base64 } },
        { type: "text", text: promptText }
      ]
    }]);
    resultEl.innerHTML = `<div class="result ${color}">${text.replace(/\n/g, '<br>')}</div>`;
  } catch (err) {
    resultEl.innerHTML = `<div class="error">Oj! Något gick fel: ${err.message}</div>`;
  }
}

function renderStory() {
  modeContent.innerHTML = `
    ${backButton()}
    <h2 class="mode-title">📖 Berättarbygget</h2>
    <p class="hint">Skriv in tre ord — vilka som helst! Sen hittar AI:n på en berättelse där alla orden är med.</p>
    <div class="word-inputs">
      <div>
        <span class="word-label">Ord 1</span>
        <input type="text" class="word-input" id="word1" placeholder="drake" maxlength="20">
      </div>
      <div>
        <span class="word-label">Ord 2</span>
        <input type="text" class="word-input" id="word2" placeholder="glass" maxlength="20">
      </div>
      <div>
        <span class="word-label">Ord 3</span>
        <input type="text" class="word-input" id="word3" placeholder="raket" maxlength="20">
      </div>
    </div>
    <button class="btn-primary" onclick="generateStory()">✨ Skapa berättelsen!</button>
    <div id="story-result"></div>
  `;
}

async function generateStory() {
  const w1 = document.getElementById('word1').value.trim();
  const w2 = document.getElementById('word2').value.trim();
  const w3 = document.getElementById('word3').value.trim();
  if (!w1 || !w2 || !w3) {
    document.getElementById('story-result').innerHTML = `<div class="error">Skriv in alla tre orden först! 🙂</div>`;
    return;
  }
  const resultEl = document.getElementById('story-result');
  resultEl.innerHTML = loadingHTML('AI:n hittar på en berättelse...');
  try {
    const text = await callClaude([{
      role: "user",
      content: `Du är en berättare som pratar med barn i årskurs 1 (cirka 7-8 år). Hitta på en kort, rolig och fantasifull berättelse på svenska (5-8 meningar) där alla dessa tre ord ingår: "${w1}", "${w2}" och "${w3}". Berättelsen ska vara snäll, lite tokig och rolig. Inga läskiga inslag, inget våld, inga vuxenämnen. Ge berättelsen en rolig kort titel på första raden i formatet **Titel** följt av tomrad och sedan själva berättelsen.`
    }]);
    const formatted = text
      .replace(/\*\*(.+?)\*\*/g, '<strong style="font-size:1.4em;display:block;margin-bottom:14px;">$1</strong>')
      .replace(/\n/g, '<br>');
    resultEl.innerHTML = `<div class="result peach">${formatted}</div>`;
  } catch (err) {
    resultEl.innerHTML = `<div class="error">Oj! Något gick fel: ${err.message}</div>`;
  }
}

function renderAsk() {
  modeContent.innerHTML = `
    ${backButton()}
    <h2 class="mode-title">🤖 Fråga roboten</h2>
    <p class="hint">Skriv vad du undrar — vad som helst! AI:n försöker svara på enkelt sätt.</p>
    <textarea class="ask-input" id="ask-question" placeholder="Skriv din fråga här... t.ex. Varför är himlen blå?"></textarea>
    <button class="btn-primary" onclick="askQuestion()">🤖 Svara!</button>
    <div id="ask-result"></div>
  `;
}

async function askQuestion() {
  const q = document.getElementById('ask-question').value.trim();
  if (!q) {
    document.getElementById('ask-result').innerHTML = `<div class="error">Skriv en fråga först! 🙂</div>`;
    return;
  }
  const resultEl = document.getElementById('ask-result');
  resultEl.innerHTML = loadingHTML('AI:n funderar...');
  try {
    const text = await callClaude([{
      role: "user",
      content: `Du är en vänlig AI-robot som pratar med ett barn i årskurs 1 (cirka 7-8 år) i ett klassrum i Sverige. Svara på frågan med enkel svenska, korta meningar och en varm, glad ton. Använd gärna jämförelser barn förstår. Var ärlig — om du inte vet något, säg det glatt. Om frågan handlar om något olämpligt för barn (våld, vuxenämnen, något farligt), säg snällt att det inte är något du kan prata om och föreslå en rolig fråga istället. Håll svaret kort — max 4-5 meningar.

Frågan: ${q}`
    }]);
    resultEl.innerHTML = `<div class="result violet">${text.replace(/\n/g, '<br>')}</div>`;
  } catch (err) {
    resultEl.innerHTML = `<div class="error">Oj! Något gick fel: ${err.message}</div>`;
  }
}
</script>
</body>
</html>
